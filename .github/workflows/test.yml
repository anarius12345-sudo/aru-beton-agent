name: Тест агента ARU Beton
 
on:
  workflow_dispatch:
  schedule:
    - cron: '15 10 * * *'
 
jobs:
  run-agent:
    runs-on: ubuntu-latest
    steps:
      - name: Скачать код
        uses: actions/checkout@v4
 
      - name: Установить Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
 
      - name: Установить шрифты (кириллица для PDF)
        run: sudo apt-get update && sudo apt-get install -y fonts-dejavu-core
 
      - name: Установить библиотеки
        run: pip install requests openpyxl reportlab
 
      - name: Запустить агента
        env:
          WIALON_TOKEN: ${{ secrets.WIALON_TOKEN }}
          SMARTGAS_API_KEY: ${{ secrets.SMARTGAS_API_KEY }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: python agent.py
